kotlinVersion=1.9.25
composeCompilerVersion=1.5.15

# Memory optimization for low-RAM devices
org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.daemon=true
org.gradle.caching=true

# Android optimization
android.useAndroidX=true
android.enableJetifier=true
android.enableR8.fullMode=true
android.enableDexingArtifactTransform=false

# Memory-specific optimizations
android.enableIncrementalDesugaring=false
android.experimental.enableSourceSetPathsMap=false

